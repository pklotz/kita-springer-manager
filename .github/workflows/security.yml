name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run so vulnerability DB updates surface even on quiet branches.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend (für go:embed)
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...

  sbom-and-scan:
    name: SBOM + Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install cyclonedx-gomod
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOMs (CycloneDX)
        run: make sbom

      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/*.cdx.json
          retention-days: 90

      - name: Vulnerability scan (Grype, fail on High/Critical)
        run: |
          grype sbom:sbom/backend.cdx.json  --fail-on high
          grype sbom:sbom/frontend.cdx.json --fail-on high

  image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        run: docker buildx build --platform linux/amd64 -t kita-springer:ci --load .

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan image (Grype, fail on High/Critical)
        run: grype kita-springer:ci --fail-on high
