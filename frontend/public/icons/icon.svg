<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Kita Springer Manager">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, ~22% radius (iOS app-icon proportion) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Springer pictogram (white) -->
  <g fill="#ffffff" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="318" cy="118" r="46" stroke="none"/>

    <!-- Torso, leaning forward -->
    <line x1="298" y1="172" x2="216" y2="296" stroke-width="72"/>

    <!-- Back arm, swung behind -->
    <line x1="262" y1="222" x2="148" y2="198" stroke-width="40"/>

    <!-- Front arm, raised forward -->
    <line x1="262" y1="222" x2="362" y2="148" stroke-width="40"/>

    <!-- Front leg, lifted and bent -->
    <polyline points="216,296 322,304 388,206" fill="none" stroke-width="52"/>

    <!-- Back leg, pushing off -->
    <line x1="216" y1="296" x2="116" y2="402" stroke-width="52"/>
  </g>

  <!-- Warm accent: heart for "Kind / Betreuung" -->
  <g fill="#fbbf24">
    <circle cx="372" cy="388" r="22"/>
    <circle cx="408" cy="388" r="22"/>
    <path d="M 350 396 L 430 396 L 390 444 Z"/>
  </g>
</svg>
